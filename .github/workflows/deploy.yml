name: Deploy to EC2

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Dependency installation
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{secrets.AWS_ROLE_ARN}}
          aws-region: ${{vars.AWS_REGION}}

      - name: Deploy through SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_URL: https://github.com/VMKer/DevOps_TestApplication
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          PARAMS=$(python3 - <<'PY'
          import json, os, shlex

          repo_dir = "/home/ec2-user/test-app"
          branch = os.environ["BRANCH_NAME"]
          repo_url = os.environ["REPO_URL"]
          env_file = os.environ["APP_ENV_FILE"]

          d = shlex.quote(repo_dir)
          b = shlex.quote(branch)
          r = shlex.quote(repo_url)

          commands = [
              "set -Eeuo pipefail",
              f"mkdir -p {d}",
              f"if [ ! -d {d}/.git ]; then git clone --branch {b} {r} {d}; fi",
              f"cd {d}",
              f"git fetch origin {b}",
              f"git checkout -B {b} origin/{b}",
              "cat > .env <<'EOF'\n" + env_file + "\nEOF",
              "chmod 600 .env",
              f"sudo -iu ec2-user bash -lc 'cd {d} && bash deploy-test-app.sh {b}'",
          ]

          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
          WAIT_RC=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json || true

          test "$WAIT_RC" -eq 0